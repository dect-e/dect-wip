exten = _01999.,1,NoOp()
same = n,Dial(PJSIP/${EXTEN:5}@epvpn)

include => utils
include => call_groups
include => call_extensions
include => call_temp_extensions

;same = n,SET(DB(callstats/duration/${ARG1})=$[0${DB(callstats/duration/${ARG1})}+${CDR(billsec)}])

;; -- EXTENSTIONS and Groups --

[call_extensions]
exten = _XX.,1,NoOp()
same = n,Dial(${PJSIP_DIAL_CONTACTS(${EXTEN})},120)
same = n,Hangup()

[call_temp_extensions]
exten = _t.,1,NoOp()
same = n,Dial(${PJSIP_DIAL_CONTACTS(${EXTEN})},120)
same = n,Hangup()

[call_groups]
exten = 2000,1,NoOp()
;same = n,Answer()
same = n,Dial(PJSIP/7590&PJSIP/4144,120)
same = n,Hangup()

;; -- Utils, Netzansagen, Stuff  ---
[utils]

exten = _031[0-1],1,NoOp()
same = n,Answer()
same = n,Verbose("${CALLERID(num)} Called Netzansage")
same = n,Playback("netzansage")
same = n,Hangup()


exten = 9999,1,NoOp()
same = n,Answer()
same = n,Echo()
same = n,Hangup()

;; -- DIALIN --

[dialin]
exten = _.,1,NoOp()
same = n,Goto(dialin-s1-extract-to-header,${EXTEN},1)


[dialin-s1-extract-to-header]
;; extract to-header and save it in to_header
;; now give call to s2

exten = _.,1,NoOp()
same = n,NoOp(Attempting to extract DID from SIP To header)
same = n,Set(to_header=${CUT(CUT(PJSIP_HEADER(read,To),@,1),:,2)})
same = n,Goto(dialin-s2-extract-ddi,${to_header},1)

[dialin-s2-extract-ddi]
;; extract ddi from to_header
;; now give call to distri

exten = _+49941383388.,1,NoOp()
same = n,Verbose("extracted DDI=${EXTEN:12}")
same = n,Goto(dialin-distri,${EXTEN:12},1)

[dialin-distri]

include => utils
include => call_groups
include => call_extensions

