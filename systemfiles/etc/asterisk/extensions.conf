[general]
static=yes
writeprotect=yes
clearglobalvars=no

;; --  Start of Configuration --

;; -- Context temp, ext, etc

[from_temp_dect]


; #finde_me token
; update if other tokensyntax is used
exten = _01990.,1,NoOp()
same = n,Answer()
same = n,Playback("selfservice_ansage")
same = n,Verbose("Temporäre Nummer ${CALLERID(num)} hat Token ${EXTEN} angerufen")
same = n,Set(save_CALLERID=${FILTER(A-Za-z0-9_\-, ${CALLERID(num)})})
same = n,Set(save_EXTEN=${FILTER(A-Za-z0-9_\-, ${EXTEN})})
same = n,Set(connect_api_stdout=${SHELL(curl -X POST -H "Content-Type: application/json" --data '{"callerid":"${save_CALLERID}","token":"${save_EXTEN}"}' http://127.0.0.1:8081/connect/)})
same = n,Verbose("Output for Connect/API/CURL ${connect_api_stdout}")

; goto error if something went wrong
; we can't play a sound for success - on success our sip-extenstion gets removed on the omm -> instant disconnect
same = n,GotoIf($[${REGEX("extension added" ${connect_api_stdout})}]?hangup:error)

same = n(error),Verbose("error")
same = n,Playback("selfservice_error")

same = n(hangup),Hangup()



include => utils
include => call_groups
include => call_extensions
include => call_temp_extensions

[from_user]

